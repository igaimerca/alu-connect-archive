name: alu_connect
description: ALU Connect — student engagement platform for the African Leadership University.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  path: ^1.9.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#0B111D"
  adaptive_icon_foreground: assets/images/logo.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B111D"
  image: assets/images/logo.png
  android_12:
    color: "#0B111D"
    image: assets/images/logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/
